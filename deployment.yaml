apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-website

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-website

  template:
    metadata:
      labels:
        app: devops-website

    spec:
      containers:
      - name: website
        image: nginx:alpine
        ports:
        - containerPort: 80